image:
  repository: dkrinitsyn/llm-broker
  pullPolicy: Always
  tag: "20260627182435"

llamacpp:
  binDir: /opt/ollama-build/latest
  modelDir: /var/lib/llama-models

# One DaemonSet per pool, scheduled onto nodes with that `purpose` label.
# `queues` is ordered: the broker drains queues[0] fully before checking queues[1], etc.
pools:
  - name: ksai
    queues:
      - llm_requests_sai
  - name: kmai
    queues:
      - llm_requests_mai
      - llm_requests_sai

brokerPort: 8000

env:
  RABBITMQ_URL: "amqp://guest:guest@rabbitmq.rabbitmq.svc.cluster.local/"
  RESPONSE_QUEUE: "llm_responses"
  LLAMA_BIN_DIR: "/opt/llama-bin"
  LLAMA_MODEL_DIR: "/models"
  LLAMA_PORT: "8080"

namespace:  
