image:
  repository: dkrinitsyn/llm-broker
  pullPolicy: Always
  tag: "20260622195630"

llamacpp:
  binDir: /opt/ollama-build/latest
  modelHostPath: /var/lib/llama-models/model.gguf

nodeSelectorValues:
  - ksai
  - kmai

brokerPort: 8000

env:
  RABBITMQ_URL: "amqp://guest:guest@rabbitmq.rabbitmq.svc.cluster.local/"
  REQUEST_QUEUE: "llm_requests"
  LLAMA_BIN_DIR: "/opt/llama-bin"
  LLAMA_MODEL_PATH: "/models/model.gguf"
  LLAMA_PORT: "8080"

namespace:  
