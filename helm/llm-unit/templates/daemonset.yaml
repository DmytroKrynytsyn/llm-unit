{{- range $i, $pool := .Values.pools }}
{{- if $i }}
---
{{- end }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: llm-unit-{{ $pool.name }}
  namespace: {{ $.Values.namespace }}
spec:
  selector:
    matchLabels:
      app: llm-unit
      pool: {{ $pool.name }}
  template:
    metadata:
      labels:
        app: llm-unit
        pool: {{ $pool.name }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ $.Values.brokerPort }}"
    spec:
      terminationGracePeriodSeconds: 0
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: purpose
                    operator: In
                    values:
                      - {{ $pool.name }}
      containers:
        - name: llm-broker
          image: "{{ $.Values.image.repository }}:{{ $.Values.image.tag }}"
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          ports:
            - containerPort: {{ $.Values.brokerPort }}
          env:
            - name: REQUEST_QUEUES
              value: {{ join "," $pool.queues | quote }}
            {{- range $key, $val := $.Values.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          volumeMounts:
            - name: llama-bin
              mountPath: /opt/llama-bin
              readOnly: true
            - name: llama-model
              mountPath: /models
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: {{ $.Values.brokerPort }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: {{ $.Values.brokerPort }}
            initialDelaySeconds: 10
            periodSeconds: 20
      volumes:
        - name: llama-bin
          hostPath:
            path: {{ $.Values.llamacpp.binDir }}
            type: Directory
        - name: llama-model
          hostPath:
            path: {{ $.Values.llamacpp.modelDir }}
            type: Directory
{{- end }}
